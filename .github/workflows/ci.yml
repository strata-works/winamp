name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - name: Install system deps
        # parley/fontique link the system `fontconfig` (for system-font fallback) on Linux
        # via yeslogic-fontconfig-sys; rodio (carapace-demo audio) pulls in alsa-sys, which
        # needs the ALSA dev package (`alsa.pc`) to build. Without these the build scripts fail.
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev libasound2-dev pkg-config
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - name: Test (headless workspace)
        # Whole workspace now that the throwaway proto/spike-render crates are gone.
        # The only GPU test (carapace render_offscreen) is gated behind the `gpu-tests`
        # feature, so it compiles out here and runs only in the `render` (lavapipe) job;
        # benches don't run under `cargo test`. So this stays headless + GPU-free.
        run: cargo test --locked --workspace

  render:
    runs-on: ubuntu-latest
    # Best-effort software-render leg: do not block the PR while lavapipe is dialed in.
    # Promote to a required check once it has run green a few times.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal
      - name: Install Mesa lavapipe (software Vulkan) + fontconfig
        # fontconfig (libfontconfig1-dev) is needed by parley/fontique's yeslogic-fontconfig-sys
        # build script on Linux; mesa lavapipe provides the software Vulkan adapter for vello.
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers libvulkan1 vulkan-tools libfontconfig1-dev pkg-config
      - name: Diagnose Vulkan ICDs
        # Surfaces the actual lavapipe ICD path + whether an adapter is visible,
        # so a future run can pin VK_ICD_FILENAMES if auto-discovery isn't enough.
        run: |
          echo "== /usr/share/vulkan/icd.d =="; ls -la /usr/share/vulkan/icd.d/ || true
          echo "== vulkaninfo --summary =="; vulkaninfo --summary 2>&1 | head -60 || true
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-render-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-render-
      - name: Render tests (lavapipe software Vulkan)
        # Rely on the Vulkan loader auto-discovering the lavapipe ICD that
        # mesa-vulkan-drivers installs under /usr/share/vulkan/icd.d/. Do NOT
        # override VK_ICD_FILENAMES with a guessed path — a wrong path suppresses
        # auto-discovery and yields "no adapter". WGPU_BACKEND=vulkan since vello
        # needs compute (GL/llvmpipe can't drive vello).
        env:
          WGPU_BACKEND: vulkan
        run: cargo test --locked -p carapace --features gpu-tests --test render_offscreen
