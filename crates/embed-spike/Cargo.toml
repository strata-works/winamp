[package]
name = "embed-spike"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]   # cdylib for Swift to link; rlib so tests/examples can use it

[dependencies]
carapace = { path = "../carapace" }
core-foundation = "0.10.1"
io-surface = "0.16.1"
libc = "0.2.186"
pollster = "0.4.0"
wgpu = "29.0.3"

[dev-dependencies]
carapace = { path = "../carapace" }
image = "0.24"
