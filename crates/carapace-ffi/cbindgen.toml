language = "C"
include_guard = "CARAPACE_FFI_H"
pragma_once = true
cpp_compat = true
autogen_warning = "/* Generated by cbindgen. Do not edit by hand. Regenerate: cargo test -p carapace-ffi --test header regenerate_header -- --ignored --exact */"
tab_width = 2
style = "type"
sys_includes = ["IOSurface/IOSurfaceRef.h"]

[parse]
parse_deps = false

[defines]
"target_os = macos" = "CARAPACE_APPLE"
"target_os = ios" = "CARAPACE_APPLE"

[enum]
prefix_with_name = false

[export]
exclude = [
  "IOSurfaceRef",
  "IOSurfaceLock",
  "IOSurfaceUnlock",
  "IOSurfaceGetBaseAddress",
  "IOSurfaceGetBytesPerRow",
  "IOSurfaceGetWidth",
  "IOSurfaceGetHeight",
  # Test-only forced-panic export (`#[cfg(test)]` in handle.rs): cbindgen parses source
  # statically and doesn't evaluate `test` as a cfg predicate, so without this explicit
  # exclude it would leak into the header on every regeneration even though it never
  # ships. See task-11-report.md.
  "carapace_force_panic",
]
