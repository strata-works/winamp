language = "C"
include_guard = "CARAPACE_FFI_H"
pragma_once = true
cpp_compat = true
autogen_warning = "/* Generated by cbindgen. Do not edit by hand. Regenerate: cargo test -p carapace-ffi --test header regenerate_header -- --ignored --exact */"
tab_width = 2
style = "type"
sys_includes = ["IOSurface/IOSurfaceRef.h"]

[parse]
parse_deps = false

[defines]
"target_os = macos" = "CARAPACE_APPLE"
"target_os = ios" = "CARAPACE_APPLE"

[enum]
prefix_with_name = false

[export]
exclude = [
  "IOSurfaceRef",
  "IOSurfaceLock",
  "IOSurfaceUnlock",
  "IOSurfaceGetBaseAddress",
  "IOSurfaceGetBytesPerRow",
  "IOSurfaceGetWidth",
  "IOSurfaceGetHeight",
]
